<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>睦聚開發—大管家儀表板</title>
  <style>
    :root {
      font-family: "Noto Sans TC", system-ui, sans-serif;
      color: #111827;
    }
    body {
      margin: 0; padding: 22px;
      background: linear-gradient(135deg,#ede9fe,#cffafe);
    }
    header {
      margin-bottom: 18px; color: #1e293b;
    }
    h1 { font-size: 26px; letter-spacing: 2px; }
    .label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #38bdf8;
      color: #0f172a;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .subtext { color: #3b444d; font-size: 14px; margin: 8px 0 0; }
    .quote { color: #4338ca; font-size: 14px; margin: 4px 0 0; font-weight: 600; }
    .stack { display:flex; flex-direction:column; gap:13px; }
    article { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 4px 14px rgba(15,23,42,0.11); }
    article h2 { margin-top:0; font-size: 17px; color: #0f172a; }
    ul { margin:0; padding-left:20px; color: #1e293b; }
    li { margin-bottom: 5px; line-height: 1.5; }
    .note { margin-top:8px; font-size:13px; color:#64748b; }
  </style>
</head>
<body>
<header>
<div class="label">Weekend Mode</div>
<h1>睦聚開發—大管家儀表板</h1>
<p class="subtext">最後更新：2026-03-21 09:55</p>
<p class="quote">今日金句：相信努力，累積才有未來。</p>
</header>
<section class="stack">
<article>
<h2>快報精華</h2>
<ul>
<li>09:00｜沙鹿掃墓（已排程）</li>
<li>09:30｜逢甲在職專班面試（待辦，高/中優先級）</li>
</ul>
</article>
<article>
<h2>其他說明</h2>
<ul>
<li>今日 Calendar 無新行程</li>
<li>如有異動即時反映於本頁與群組</li>
</ul>
</article>
</section>
</body>
</html>
